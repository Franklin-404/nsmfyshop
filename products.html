<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - nsmfy Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">
                <img src="NSMFY LOGO illustratorAsset 1.svg" alt="nsmfy logo" class="logo-img">
            </a>
            
            <div class="search-bar">
                <input type="text" placeholder="Search items..." id="search-input">
                <button type="button" id="search-btn">Search</button>
            </div>
            
            <div class="nav-menu">
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="products.html" class="active">Products</a>
                    <a href="seller.html">Sell</a>
                </nav>
                <div class="nav-actions">
                    <a href="cart.html" class="cart-button" aria-label="Cart">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <span id="cart-count" data-empty="true">0</span>
                    </a>
                    <button class="auth-button" id="auth-btn" onclick="location.href='login.html'">Sign In / Register</button>
                </div>
            </div>
        </div>
    </header>

    <main class="products-page-layout">
        <div class="products-page-container">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar">
                <div class="sidebar-header">
                    <h3>Filters</h3>
                    <button class="clear-filters-btn">Clear All</button>
                </div>
                
                <hr class="sidebar-divider">

                <div class="filter-group">
                    <h4>Category</h4>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="category" value="electronics">
                        <span>Electronics</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="category" value="books">
                        <span>Books & Literature</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="category" value="office">
                        <span>Office & Home</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="category" value="decor">
                        <span>Home Decor</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="category" value="fashion">
                        <span>Fashion & Bags</span>
                    </label>
                </div>

                <hr class="sidebar-divider">

                <div class="filter-group">
                    <h4>Condition</h4>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="condition" value="new">
                        <span>New</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="condition" value="like-new">
                        <span>Like New</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="condition" value="good">
                        <span>Good</span>
                    </label>
                    <label class="filter-checkbox-label">
                        <input type="checkbox" name="condition" value="fair">
                        <span>Fair</span>
                    </label>
                </div>

                <hr class="sidebar-divider">

                <div class="filter-group">
                    <h4>Price Range (ZAR)</h4>
                    <div class="price-range-inputs">
                        <input type="number" placeholder="Min" id="price-min" min="0">
                        <span>-</span>
                        <input type="number" placeholder="Max" id="price-max" min="0">
                    </div>
                    <button class="apply-filters-btn">Apply Price</button>
                </div>
            </aside>

            <!-- Products Content Area -->
            <div class="products-content">
                <div class="products-content-header">
                    <span class="results-count">Showing 6 products</span>
                    <div class="sort-by">
                        <label for="sort-select">Sort by:</label>
                        <select id="sort-select">
                            <option value="featured">Featured</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="newest">Newest Listings</option>
                        </select>
                    </div>
                </div>

                <div id="main-product-grid" class="products-list-grid">
                    <!-- Dynamic Products -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="seller.html">Sell on nsmfy</a>
                <a href="login.html">Sign In / Register</a>
                <a href="admin.html">Admin</a>
            </div>
            <p>&copy; 2026 nsmfy &mdash; South Africa's Swap &amp; Buy Marketplace</p>
        </div>
    </footer>
    <script src="api.js"></script>
    <script src="cart.js"></script>
    <script src="marketplace.js"></script>
</body>
</html>
